name = "boongleam"
version = "0.1.0"
target = "erlang"

description = "Gleam implementation and codegen backend for Boon"
licences = ["Apache-2.0"]
repository = { type = "github", user = "BoonLang", repo = "boon-gleam" }

[dependencies]
gleam_stdlib = "1.0.0"
gleam_http = "4.3.0"
gleam_erlang = "1.3.0"
gleam_otp = "1.2.0"
gleam_json = "3.1.0"
etch = "1.3.3"
mist = "6.0.3"
shelf = "1.0.0"
pog = "4.1.0"

[dev-dependencies]
lustre = "5.6.0"
gleeunit = ">= 1.0.0 and < 2.0.0"
